name: kaze_app
description: A new Flutter project.
publish_to: 'none'
version: 0.1.0

environment:
  sdk: '>=3.0.3 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_screenutil: ^5.9.3
  google_nav_bar: ^5.0.6
  line_icons: ^2.0.3
  stacked: ^3.4.0
  stacked_services: ^1.1.0

dev_dependencies:
  build_runner: ^2.4.5
  flutter_lints: ^2.0.0
  flutter_test:
    sdk: flutter
  mockito: ^5.4.1
  stacked_generator: ^1.3.3

flutter:
  uses-material-design: true
  assets:
    - assets/images/
  fonts:
    - family: Lato
      fonts:
        - asset: assets/fonts/lato/Lato-Black.ttf
          weight: 900
        - asset: assets/fonts/lato/Lato-BlackItalic.ttf
          weight: 800
        - asset: assets/fonts/lato/Lato-Bold.ttf
          weight: 700
        - asset: assets/fonts/lato/Lato-BoldItalic.ttf
          weight: 600
        - asset: assets/fonts/lato/Lato-Italic.ttf
          weight: 500
        - asset: assets/fonts/lato/Lato-Light.ttf
          weight: 400
        - asset: assets/fonts/lato/Lato-LightItalic.ttf
          weight: 300
        - asset: assets/fonts/lato/Lato-Regular.ttf
          weight: 200
        - asset: assets/fonts/lato/Lato-Thin.ttf
          weight: 100
        - asset: assets/fonts/lato/Lato-ThinItalic.ttf
          weight: 100
    - family: Pilat
      fonts:
        - asset: assets/fonts/pilat/PilatExtended-Black.ttf
          weight: 900
        - asset: assets/fonts/pilat/PilatExtended-Bold.ttf
          weight: 700
        - asset: assets/fonts/pilat/PilatExtended-Book.ttf
          weight: 500
        - asset: assets/fonts/pilat/PilatExtended-DemiBold.ttf
          weight: 600
        - asset: assets/fonts/pilat/PilatExtended-Heavy.ttf
          weight: 800
        - asset: assets/fonts/pilat/PilatExtended-Light.ttf
          weight: 300
        - asset: assets/fonts/pilat/PilatExtended-Regular.ttf
          weight: 400
        - asset: assets/fonts/pilat/PilatExtended-Thin.ttf
          weight: 100